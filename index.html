<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>恋爱人格测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-page: #faf8f5;
            --bg-card: #ffffff;
            --text-primary: #4a4a4a;
            --text-secondary: #9b9b9b;
            --accent-pink: #ff8fa3;
            --accent-mint: #98d4bb;
            --accent-cream: #fff5e6;
            --border-color: #f0ebe5;
        }

        body {
            font-family: 'PingFang SC', -apple-system, BlinkMacSystemFont, 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-page);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 375px;
            margin: 0 auto;
            min-height: 100vh;
            background: var(--bg-page);
        }

        /* ========== 封面页 - 小清新风格 ========== */
        .page-cover {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 24px;
            background: linear-gradient(180deg, #fffcf9 0%, #faf8f5 100%);
            position: relative;
            overflow: hidden;
        }

        /* 装饰性圆形元素 */
        .page-cover::before,
        .page-cover::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            opacity: 0.5;
        }

        .page-cover::before {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #ffe4e8 0%, #fff5e6 100%);
            top: -60px;
            right: -60px;
        }

        .page-cover::after {
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, #e8f5f0 0%, #ffe4e8 100%);
            bottom: 80px;
            left: -40px;
        }

        .cover-icon {
            font-size: 72px;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .cover-title-decoration {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }

        .cover-line {
            width: 24px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #ddd, transparent);
        }

        .cover-heart {
            width: 8px;
            height: 8px;
            background: var(--accent-pink);
            transform: rotate(45deg);
            position: relative;
        }

        .cover-heart::before,
        .cover-heart::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--accent-pink);
            border-radius: 50%;
        }

        .cover-heart::before {
            top: -4px;
            left: 0;
        }

        .cover-heart::after {
            top: 0;
            left: -4px;
        }

        .cover-title {
            font-size: 26px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
        }

        .cover-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            line-height: 1.6;
            position: relative;
            z-index: 1;
        }

        .cover-desc {
            font-size: 13px;
            color: #b5b5b5;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            margin-bottom: 32px;
            position: relative;
            z-index: 1;
        }

        .cover-card {
            background: white;
            border-radius: 20px;
            padding: 24px 32px;
            margin-bottom: 32px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.03);
            position: relative;
            z-index: 1;
        }

        .cover-card-icon {
            text-align: center;
            font-size: 28px;
            margin-bottom: 12px;
        }

        .cover-card-title {
            text-align: center;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .cover-card-subtitle {
            text-align: center;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .cover-features {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 36px;
            position: relative;
            z-index: 1;
        }

        .feature-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .feature-icon {
            width: 44px;
            height: 44px;
            background: white;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
        }

        .feature-num {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .feature-label {
            font-size: 10px;
            color: var(--text-secondary);
        }

        .start-btn {
            width: 100%;
            max-width: 260px;
            background: linear-gradient(135deg, #ffb3c1 0%, #ff8fa3 100%);
            border: none;
            color: white;
            padding: 16px 32px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 6px 20px rgba(255, 143, 163, 0.35);
            position: relative;
            z-index: 1;
            letter-spacing: 1px;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 143, 163, 0.45);
        }

        .start-btn:active {
            transform: translateY(0);
        }

        .cover-note {
            margin-top: 24px;
            font-size: 11px;
            color: #c5c5c5;
            position: relative;
            z-index: 1;
        }

        .cover-note::before {
            content: '';
            display: inline-block;
            width: 12px;
            height: 1px;
            background: #ddd;
            vertical-align: middle;
            margin-right: 8px;
        }

        .cover-note::after {
            content: '';
            display: inline-block;
            width: 12px;
            height: 1px;
            background: #ddd;
            vertical-align: middle;
            margin-left: 8px;
        }

        /* 答题页 */
        .page-quiz {
            display: none;
            flex-direction: column;
            min-height: 100vh;
            padding: 20px 24px;
            background: var(--bg-page);
        }

        .quiz-header {
            margin-bottom: 24px;
        }

        .progress-bar {
            height: 4px;
            background: #ebe7e2;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffb3c1, #ff8fa3);
            transition: width 0.3s ease;
            border-radius: 2px;
        }

        .progress-text {
            font-size: 13px;
            color: var(--text-secondary);
            text-align: right;
        }

        .question-type {
            display: inline-block;
            background: rgba(152, 212, 187, 0.2);
            color: #6aa88a;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            margin-bottom: 16px;
        }

        .question-type.normal {
            background: rgba(152, 212, 187, 0.2);
            color: #6aa88a;
        }

        .question-type.reverse {
            background: rgba(255, 143, 163, 0.15);
            color: #e57387;
        }

        .question-text {
            font-size: 19px;
            font-weight: 600;
            line-height: 1.6;
            margin-bottom: 28px;
            color: var(--text-primary);
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            background: var(--bg-card);
            border: 1px solid #f0ebe5;
            padding: 16px 18px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .option:hover {
            border-color: #ffd4dc;
            background: #fff9fa;
        }

        .option.selected {
            border-color: #ff8fa3;
            background: #fff5f7;
        }

        .option-letter {
            width: 28px;
            height: 28px;
            background: #faf8f5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .option.selected .option-letter {
            background: linear-gradient(135deg, #ffb3c1 0%, #ff8fa3 100%);
            color: white;
        }

        .option-text {
            font-size: 15px;
            line-height: 1.5;
            color: var(--text-primary);
        }

        /* 多选题样式 */
        .multi-option .option-checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid #e8e3dd;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .multi-option.selected .option-checkbox {
            background: linear-gradient(135deg, #ffb3c1 0%, #ff8fa3 100%);
            border-color: #ff8fa3;
        }

        .multi-option.selected .option-checkbox::after {
            content: '✓';
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        .multi-option .option-letter {
            display: none;
        }

        .confirm-btn {
            background: linear-gradient(135deg, #ffb3c1 0%, #ff8fa3 100%);
            border: none;
            color: white;
            padding: 16px 32px;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            box-shadow: 0 4px 15px rgba(255, 143, 163, 0.3);
        }

        .confirm-btn:disabled {
            background: #e0dbd5;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* 结果页 - 搞笑风格 */
        .page-result {
            display: none;
            flex-direction: column;
            min-height: 100vh;
            padding: 16px 20px 40px;
            background: var(--bg-page);
        }

        .result-header {
            text-align: center;
            padding: 8px 0 16px;
        }

        /* 人格配图样式 */
        .personality-image {
            width: 100%;
            max-width: 280px;
            margin: 0 auto 16px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(255, 143, 163, 0.2);
        }

        .personality-image img {
            width: 100%;
            height: auto;
            display: block;
        }

        .result-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .result-type {
            font-size: 24px;
            font-weight: 700;
            color: #e57387;
            margin-bottom: 6px;
        }

        .result-tagline {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .result-score {
            display: inline-block;
            background: linear-gradient(135deg, #fff5f7, #fff0f3);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            color: #e57387;
        }

        .result-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
            border: 1px solid #f5f0eb;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.03);
        }

        .result-card-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .result-description {
            font-size: 15px;
            line-height: 1.9;
            color: #6b6b6b;
        }

        .result-quote {
            margin-top: 16px;
            padding: 16px;
            background: #fff9fa;
            border-radius: 14px;
            font-size: 14px;
            color: var(--text-primary);
            line-height: 1.7;
        }

        .result-quote::before {
            content: '💬 ';
        }

        .radar-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px 0;
        }

        .radar-chart {
            width: 260px;
            height: 260px;
        }

        .radar-labels {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
        }

        .radar-label {
            font-size: 12px;
            color: var(--text-secondary);
            background: #faf8f5;
            padding: 4px 10px;
            border-radius: 12px;
        }

        .hidden-type {
            margin-top: 8px;
            padding: 16px 20px;
            background: linear-gradient(135deg, #fff9f9, #fff0f3);
            border-radius: 16px;
            text-align: center;
            border: 1px solid #ffd9e0;
        }

        .hidden-label {
            font-size: 12px;
            color: #e57387;
            margin-bottom: 4px;
        }

        .hidden-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .tips-list {
            margin-top: 4px;
        }

        .tip-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 14px;
            font-size: 14px;
            color: #6b6b6b;
            line-height: 1.6;
        }

        .tip-item:last-child {
            margin-bottom: 0;
        }

        .tip-icon {
            font-size: 14px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .result-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn-share {
            flex: 1;
            background: linear-gradient(135deg, #ffb3c1 0%, #ff8fa3 100%);
            border: none;
            color: white;
            padding: 14px 20px;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(255, 143, 163, 0.3);
        }

        .btn-restart {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid #f0ebe5;
            color: var(--text-primary);
            padding: 14px 20px;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
        }

        /* 分享卡片 */
        .share-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 99;
        }

        .share-overlay.show {
            display: block;
        }

        .share-card {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            background: white;
            border-radius: 24px;
            padding: 28px 24px;
            z-index: 100;
        }

        .share-card.show {
            display: block;
        }

        .share-card-header {
            text-align: center;
            margin-bottom: 16px;
        }

        .share-card-title {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .share-card-type {
            font-size: 22px;
            font-weight: 700;
            color: #e57387;
            margin-top: 4px;
        }

        .share-card-body {
            font-size: 14px;
            color: var(--text-secondary);
            text-align: center;
            line-height: 1.6;
            padding: 16px;
            background: #faf8f5;
            border-radius: 14px;
            margin-bottom: 16px;
        }

        .share-card-footer {
            text-align: center;
        }

        .share-card-tip {
            font-size: 12px;
            color: #e57387;
        }

        .share-close {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 28px;
            height: 28px;
            border: none;
            background: #faf8f5;
            border-radius: 50%;
            color: var(--text-secondary);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fade-in {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 封面页 - 小清新风格 -->
        <div class="page-cover" id="pageCover">
            <div class="cover-icon">🌸</div>
            <div class="cover-title-decoration">
                <span class="cover-line"></span>
                <span class="cover-heart"></span>
                <span class="cover-line"></span>
            </div>
            <h1 class="cover-title">你是哪种恋爱废物</h1>
            <p class="cover-subtitle">探索你的恋爱人格类型</p>
            <p class="cover-desc">30道题目 · 测出你的真实模样</p>
            
            <div class="cover-card">
                <div class="cover-card-icon">📝</div>
                <div class="cover-card-title">恋爱人格测试</div>
                <div class="cover-card-subtitle">基于行为心理学分析</div>
            </div>
            
            <div class="cover-features">
                <div class="feature-item">
                    <div class="feature-icon">💕</div>
                    <div class="feature-num">20+</div>
                    <div class="feature-label">人格类型</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">📊</div>
                    <div class="feature-num">8维</div>
                    <div class="feature-label">深度分析</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">⏱️</div>
                    <div class="feature-num">5分钟</div>
                    <div class="feature-label">快速测试</div>
                </div>
            </div>
            
            <button class="start-btn" id="startBtn">开始探索</button>
            <p class="cover-note">趣味测试 · 仅供娱乐</p>
        </div>

        <!-- 答题页 -->
        <div class="page-quiz" id="pageQuiz">
            <div class="quiz-header">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">1/30</div>
            </div>
            <span class="question-type" id="questionType">测试题</span>
            <h2 class="question-text" id="questionText"></h2>
            <div class="options" id="options"></div>
        </div>

        <!-- 结果页 - 搞笑风格 -->
        <div class="page-result" id="pageResult">
            <div class="result-header">
                <div class="personality-image" id="personalityImage">
                    <img id="personalityImg" src="" alt="人格配图">
                </div>
                <p class="result-label">你是哪种恋爱废物</p>
                <h2 class="result-type" id="resultType"></h2>
                <p class="result-tagline" id="resultTagline"></p>
                <span class="result-score" id="resultScore"></span>
            </div>

            <div class="result-card">
                <div class="result-card-title">📋 废物诊断书</div>
                <p class="result-description" id="resultDescription"></p>
                <div class="result-quote" id="resultQuote"></div>
            </div>

            <div class="result-card">
                <div class="result-card-title">📊 八维废物指数</div>
                <div class="radar-container">
                    <canvas id="radarChart" class="radar-chart" width="260" height="260"></canvas>
                </div>
                <div class="radar-labels" id="radarLabels"></div>
            </div>

            <div class="hidden-type hidden" id="hiddenType">
                <p class="hidden-label">🎁 隐藏废物解锁</p>
                <p class="hidden-name" id="hiddenName"></p>
            </div>

            <div class="result-card">
                <div class="result-card-title">💡 人间清醒指南</div>
                <div class="tips-list" id="tipsList"></div>
            </div>

            <div class="result-actions">
                <button class="btn-share" id="shareBtn">
                    <span>📤</span> 分享结果
                </button>
                <button class="btn-restart" id="restartBtn">重新测试</button>
            </div>
        </div>

        <!-- 分享卡片 -->
        <div class="share-overlay" id="shareOverlay"></div>
        <div class="share-card" id="shareCard">
            <button class="share-close" id="shareClose">✕</button>
            <div class="share-card-header">
                <p class="share-card-title">我的恋爱废物类型</p>
                <p class="share-card-type" id="shareType"></p>
            </div>
            <div class="share-card-body" id="shareBody"></div>
            <div class="share-card-footer">
                <p class="share-card-tip">长按保存图片 · 分享给朋友</p>
            </div>
        </div>
    </div>

    <script>
        // ============ 题目数据（搞笑风格） ============
        const questions = [
            // 正经题 40% (12道)
            {
                id: 1,
                type: 'normal',
                text: '你认为恋爱中最重要的品质是什么？',
                options: [
                    { text: '信任', scores: { '恋爱投入': 2, '安全感': 1 } },
                    { text: '沟通', scores: { '表达力': 2, '冲突处理': 2 } },
                    { text: '尊重', scores: { '独立性': 2, '务实度': 1 } },
                    { text: '感觉对了就行（你清醒一点）', scores: { '浪漫浓度': 2, '期待管理': -1 } }
                ]
            },
            {
                id: 2,
                type: 'normal',
                text: '你能接受的异地恋最远距离是？',
                options: [
                    { text: '同城最好', scores: { '独立性': -1, '安全感': 1 } },
                    { text: '高铁2小时内', scores: { '安全感': 1 } },
                    { text: '飞机3小时内', scores: { '独立性': 1, '务实度': 1 } },
                    { text: '只要有WiFi，全球都行', scores: { '浪漫浓度': 1, '独立性': 2 } }
                ]

// 兼容函数：根据人格名称获取Base64图片
function getPersonalityImage(name) {
    // 优先使用精确映射
    if (personalityImageKeys[name]) {
        const imageData = personalityImagesBase64[personalityImageKeys[name]];
        if (imageData) {
            return imageData;
        }
    }
    
    // 尝试直接匹配键名
    if (personalityImagesBase64[name]) {
        return personalityImagesBase64[name];
    }
    
    // 尝试模糊匹配（遍历查找）
    for (const key in personalityImagesBase64) {
        // 检查键名是否包含人格名称，或者人格名称是否包含键名的核心部分
        const keyCore = key.replace(/人格\d+_|隐藏人格\d+_|\.jpg/g, '');
        if (key.includes(name) || name.includes(keyCore) || keyCore.includes(name.replace(/[^\u4e00-\u9fa5a-zA-Z]/g, ''))) {
            return personalityImagesBase64[key];
        }
    }
    
    return '';
}
// ============ 状态管理 ============
        let currentQuestion = 0;
        let answers = [];
        let multiAnswers = [];
        let scores = {};
        let selectedMultiOptions = new Set();

        // ============ 初始化 ============
        function init() {
            bindEvents();
        }

        function bindEvents() {
            document.getElementById('startBtn').addEventListener('click', startQuiz);
            document.getElementById('shareBtn').addEventListener('click', showShareCard);
            document.getElementById('shareClose').addEventListener('click', hideShareCard);
            document.getElementById('shareOverlay').addEventListener('click', hideShareCard);
            document.getElementById('restartBtn').addEventListener('click', restartQuiz);
        }

        // ============ 页面切换 ============
        function showPage(pageId) {
            document.querySelectorAll('.page-cover, .page-quiz, .page-result').forEach(page => {
                page.style.display = 'none';
            });
            const targetPage = document.getElementById(pageId);
            targetPage.style.display = 'flex';
            targetPage.classList.add('fade-in');
        }

        // ============ 测试开始 ============
        function startQuiz() {
            currentQuestion = 0;
            answers = [];
            multiAnswers = [];
            selectedMultiOptions = new Set();
            scores = {};
            dimensions.forEach(dim => scores[dim] = 0);
            showPage('pageQuiz');
            renderQuestion();
        }

        // ============ 渲染题目 ============
        function renderQuestion() {
            const q = questions[currentQuestion];
            const progress = (currentQuestion / questions.length) * 100;
            
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').textContent = `${currentQuestion + 1}/${questions.length}`;
            
            const typeEl = document.getElementById('questionType');
            if (q.type === 'normal') {
                typeEl.textContent = '基础题';
                typeEl.className = 'question-type normal';
            } else if (q.type === 'multi') {
                typeEl.textContent = '多选题';
                typeEl.className = 'question-type';
            } else if (q.type === 'reverse') {
                typeEl.textContent = '⚠️ 反转题';
                typeEl.className = 'question-type reverse';
            } else if (q.type === 'special') {
                typeEl.textContent = '🎁 彩蛋题';
                typeEl.className = 'question-type';
            } else {
                typeEl.textContent = '情境题';
                typeEl.className = 'question-type';
            }
            
            document.getElementById('questionText').textContent = q.text;
            
            const optionsEl = document.getElementById('options');
            optionsEl.innerHTML = '';
            
            const letters = ['A', 'B', 'C', 'D', 'E'];
            
            if (q.type === 'multi') {
                selectedMultiOptions = new Set();
                q.options.forEach((opt, idx) => {
                    const optionDiv = document.createElement('div');
                    optionDiv.className = 'option multi-option';
                    optionDiv.innerHTML = `
                        <div class="option-checkbox"></div>
                        <span class="option-text">${opt.text}</span>
                    `;
                    optionDiv.addEventListener('click', () => toggleMultiOption(idx, opt, optionDiv));
                    optionsEl.appendChild(optionDiv);
                });
                
                const confirmBtn = document.createElement('button');
                confirmBtn.className = 'confirm-btn';
                confirmBtn.textContent = '确认选择（至少选2项）';
                confirmBtn.disabled = true;
                confirmBtn.id = 'confirmBtn';
                confirmBtn.addEventListener('click', submitMultiAnswer);
                optionsEl.appendChild(confirmBtn);
            } else {
                q.options.forEach((opt, idx) => {
                    const optionDiv = document.createElement('div');
                    optionDiv.className = 'option';
                    optionDiv.innerHTML = `
                        <span class="option-letter">${letters[idx]}</span>
                        <span class="option-text">${opt.text}</span>
                    `;
                    optionDiv.addEventListener('click', () => selectOption(idx, opt));
                    optionsEl.appendChild(optionDiv);
                });
            }
            
            optionsEl.classList.add('fade-in');
        }

        // ============ 单选题 ============
        function selectOption(index, option) {
            answers[currentQuestion] = index;
            
            if (option.scores) {
                Object.entries(option.scores).forEach(([dim, score]) => {
                    if (scores[dim] !== undefined) {
                        scores[dim] += score;
                    }
                });
            }
            
            document.querySelectorAll('.option').forEach((opt, idx) => {
                opt.classList.toggle('selected', idx === index);
            });
            
            setTimeout(() => {
                currentQuestion++;
                if (currentQuestion < questions.length) {
                    renderQuestion();
                } else {
                    showResult();
                }
            }, 250);
        }

        // ============ 多选题 ============
        function toggleMultiOption(index, opt, element) {
            if (selectedMultiOptions.has(index)) {
                selectedMultiOptions.delete(index);
                element.classList.remove('selected');
            } else {
                selectedMultiOptions.add(index);
                element.classList.add('selected');
            }
            
            const confirmBtn = document.getElementById('confirmBtn');
            confirmBtn.disabled = selectedMultiOptions.size < 2;
        }

        function submitMultiAnswer() {
            if (selectedMultiOptions.size < 2) return;
            
            multiAnswers = Array.from(selectedMultiOptions);
            answers[27] = multiAnswers.length;
            
            selectedMultiOptions.forEach(idx => {
                const opt = questions[27].options[idx];
                if (opt.scores) {
                    Object.entries(opt.scores).forEach(([dim, score]) => {
                        if (scores[dim] !== undefined) {
                            scores[dim] += score;
                        }
                    });
                }
            });
            
            currentQuestion++;
            if (currentQuestion < questions.length) {
                renderQuestion();
            } else {
                showResult();
            }
        }

        // ============ 显示结果 ============
        function showResult() {
            showPage('pageResult');
            
            // 归一化分数
            const normalizedScores = {};
            const maxPossible = { 
                '恋爱投入': 10, '安全感': 10, '表达力': 10, '冲突处理': 10,
                '浪漫浓度': 10, '独立性': 10, '期待管理': 10, '务实度': 10
            };
            
            dimensions.forEach(dim => {
                const raw = scores[dim] || 0;
                const max = maxPossible[dim];
                normalizedScores[dim] = Math.max(0, Math.min(100, ((raw + max) / (2 * max)) * 100));
            });
            
            // 找主人格
            let mainPersonality = personalities[19];
            for (const p of personalities) {
                if (p.condition(scores)) {
                    mainPersonality = p;
                    break;
                }
            }
            
            // 检查隐藏人格
            const unlockedHidden = hiddenPersonalities.filter(hp => {
                if (hp.name === '天选孤独命') {
                    return hp.condition(multiAnswers);
                }
                return hp.condition(answers) || hp.condition(scores);
            });
            
            // 渲染人格配图
            const personalityImg = document.getElementById('personalityImg');
            const imageData = getPersonalityImage(mainPersonality.name);
            if (imageData) {
                personalityImg.src = imageData;
                personalityImg.alt = mainPersonality.name;
            }
            
            // 渲染结果
            document.getElementById('resultType').textContent = mainPersonality.name;
            document.getElementById('resultTagline').textContent = mainPersonality.tagline;
            document.getElementById('resultScore').textContent = mainPersonality.score;
            document.getElementById('resultDescription').textContent = mainPersonality.description;
            document.getElementById('resultQuote').textContent = mainPersonality.quote;
            
            // 渲染建议
            const tipsList = document.getElementById('tipsList');
            tipsList.innerHTML = mainPersonality.tips.map(tip => `
                <div class="tip-item">
                    <span class="tip-icon">✨</span>
                    <span>${tip}</span>
                </div>
            `).join('');
            
            // 渲染隐藏人格（包含配图）
            const hiddenTypeEl = document.getElementById('hiddenType');
            if (unlockedHidden.length > 0) {
                hiddenTypeEl.classList.remove('hidden');
                const firstHidden = unlockedHidden[0];
                document.getElementById('hiddenName').innerHTML = 
                    `<strong>${firstHidden.name}</strong>：${firstHidden.description}`;
            } else {
                hiddenTypeEl.classList.add('hidden');
            }
            
            // 渲染雷达图
            renderRadarChart(normalizedScores);
            renderRadarLabels();
            
            // 设置分享卡片
            document.getElementById('shareType').textContent = mainPersonality.name;
            document.getElementById('shareBody').textContent = mainPersonality.tagline;
        }

        // ============ 雷达图 ============
        function renderRadarChart(data) {
            const canvas = document.getElementById('radarChart');
            const ctx = canvas.getContext('2d');
            const centerX = 130;
            const centerY = 130;
            const radius = 90;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 背景圆
            for (let i = 1; i <= 5; i++) {
                ctx.beginPath();
                ctx.strokeStyle = `rgba(255, 55, 95, ${0.08 + i * 0.03})`;
                ctx.lineWidth = 1;
                
                const r = radius * (i / 5);
                for (let j = 0; j <= 8; j++) {
                    const angle = (Math.PI * 2 * j / 8) - Math.PI / 2;
                    const x = centerX + r * Math.cos(angle);
                    const y = centerY + r * Math.sin(angle);
                    if (j === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.stroke();
            }
            
            // 轴线
            for (let i = 0; i < 8; i++) {
                const angle = (Math.PI * 2 * i / 8) - Math.PI / 2;
                ctx.beginPath();
                ctx.strokeStyle = 'rgba(255, 55, 95, 0.15)';
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(centerX + radius * Math.cos(angle), centerY + radius * Math.sin(angle));
                ctx.stroke();
            }
            
            // 数据区域
            ctx.beginPath();
            const values = Object.values(data);
            for (let i = 0; i < 8; i++) {
                const value = values[i] / 100;
                const angle = (Math.PI * 2 * i / 8) - Math.PI / 2;
                const x = centerX + radius * value * Math.cos(angle);
                const y = centerY + radius * value * Math.sin(angle);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, 'rgba(255, 55, 95, 0.3)');
            gradient.addColorStop(1, 'rgba(255, 55, 95, 0.15)');
            ctx.fillStyle = gradient;
            ctx.fill();
            
            ctx.strokeStyle = '#ff375f';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // 数据点
            for (let i = 0; i < 8; i++) {
                const value = values[i] / 100;
                const angle = (Math.PI * 2 * i / 8) - Math.PI / 2;
                const x = centerX + radius * value * Math.cos(angle);
                const y = centerY + radius * value * Math.sin(angle);
                
                ctx.beginPath();
                ctx.fillStyle = '#ffffff';
                ctx.strokeStyle = '#ff375f';
                ctx.lineWidth = 2;
                ctx.arc(x, y, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
            }
        }

        function renderRadarLabels() {
            const labelsEl = document.getElementById('radarLabels');
            labelsEl.innerHTML = dimensions.map(dim => 
                `<span class="radar-label">${dim}</span>`
            ).join('');
        }

        // ============ 分享 ============
        function showShareCard() {
            document.getElementById('shareCard').classList.add('show');
            document.getElementById('shareOverlay').classList.add('show');
        }

        function hideShareCard() {
            document.getElementById('shareCard').classList.remove('show');
            document.getElementById('shareOverlay').classList.remove('show');
        }

        // ============ 重新测试 ============
        function restartQuiz() {
            showPage('pageCover');
        }

        // ============ 启动 ============
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
